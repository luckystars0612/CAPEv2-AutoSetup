; sandbox.conf — single source of truth for CAPEv2 host & guest setup.
;
; All IPs must be reachable from the Windows guest through the bridge named
; in `resultserver_interface`. The default `virbr0` is the libvirt default
; NAT bridge on Ubuntu.

[DEFAULT]
resultserver_ip        = 192.168.122.1     ; CAPE host IP. Must be the IP of THIS Ubuntu VM (the one running cape.service).
sandbox_ip             = 192.168.122.50    ; Static IP that the Windows guest will be configured with via sandbox_config.ps1.
sandbox_names          = win10             ; VM name in virt-manager AND the [section] name in kvm.conf. Multiple names: comma-separated.
resultserver_interface = virbr0            ; libvirt bridge the guest attaches to. Used for tcpdump and internet routing.
snapshot               = clean_state       ; Snapshot name reverted before each analysis. Take it AFTER sandbox_config.ps1 finishes.